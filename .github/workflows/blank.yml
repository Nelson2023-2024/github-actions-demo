name: Hello world # Just the workflow name (what you see in GitHub UI).

on:
  push: # triggger a workflow when changes R pushed into main
    branches:
      - main
      - dev
      - "release/**" # all branchhes beginnig with release
  # pull_request:
  #   branches:
  #     - main

jobs:
  action-demo: # name of the job
    runs-on: ubuntu-latest # a job runs on a runner(VM)
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - name: Print index.html file
        run: cat index.html
            
