name: Hello world # Just the workflow name (what you see in GitHub UI).

on: workflow_dispatch # Defines when the workflow runs. (manual trigger)
jobs:
  hello: # name of the job
    runs-on: ubuntu-latest # runner where te job should run. spin up a fresh virtual machine running Linux to execute your code.
    steps: 
      - name: Hello Step # name of the step
        run: echo "Welcome to Github Actions" # what the step should do
